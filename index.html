<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>Trace Camera</title>
  <style>
    * { box-sizing: border-box; }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #000;
      font-family: system-ui, -apple-system, Segoe UI, sans-serif;
    }

    .app,
    .camera,
    .overlay {
      position: fixed;
      inset: 0;
    }

    .camera {
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: #000;
    }

    .mirror-canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: #000;
      z-index: 1;
    }

    .hidden {
      display: none !important;
    }

    .overlay {
      pointer-events: none;
    }

    .overlay-shell {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%) translate3d(0, 0, 0) rotate(0deg) scale(1);
      transform-origin: center center;
      pointer-events: auto;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }

    .overlay-shell.dragging {
      cursor: grabbing;
    }

    .overlay-image {
      display: none;
      max-width: 85vw;
      max-height: 85vh;
      opacity: var(--overlay-opacity, 0.4);
      -webkit-user-drag: none;
      user-select: none;
      pointer-events: none;
    }

    .controls {
      position: fixed;
      left: 10px;
      right: 10px;
      top: calc(env(safe-area-inset-top, 0px) + 10px);
      display: flex;
      align-items: stretch;
      flex-direction: column;
      gap: 10px;
      padding: 10px;
      border-radius: 12px;
      background: rgba(0, 0, 0, 0.55);
      border: 1px solid rgba(255, 255, 255, 0.16);
      backdrop-filter: blur(8px);
      z-index: 20;
    }

    .control-row {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .mode-select {
      width: 100%;
      min-height: 40px;
      padding: 9px 10px;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.24);
      background: rgba(255, 255, 255, 0.12);
      color: #fff;
      font: inherit;
      outline: none;
    }

    .mode-select option {
      background: #121212;
      color: #fff;
    }

    .save-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(255, 255, 255, 0.24);
      background: rgba(255, 255, 255, 0.18);
      color: #fff;
      border-radius: 10px;
      padding: 9px 12px;
      min-height: 40px;
      text-decoration: none;
      white-space: nowrap;
    }

    .slider {
      flex: 1;
      min-width: 0;
      accent-color: #ffffff;
    }

    .upload {
      border: 1px solid rgba(255, 255, 255, 0.24);
      background: rgba(255, 255, 255, 0.12);
      color: #fff;
      border-radius: 10px;
      padding: 9px 12px;
      min-height: 40px;
      cursor: pointer;
      font: inherit;
      white-space: nowrap;
    }

    .upload:active {
      transform: scale(0.98);
    }

    input[type="file"] {
      position: absolute;
      width: 1px;
      height: 1px;
      margin: -1px;
      padding: 0;
      border: 0;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
    }
  </style>
</head>
<body>
  <div class="app">
    <video id="camera" class="camera" autoplay muted playsinline webkit-playsinline></video>
    <canvas id="mirrorCanvas" class="mirror-canvas hidden" aria-label="Convex mirror preview"></canvas>

    <div class="overlay">
      <div id="overlayShell" class="overlay-shell" aria-label="Tracing overlay">
        <img id="overlayImage" class="overlay-image" alt="Tracing overlay" draggable="false" />
      </div>
    </div>

    <div class="controls">
      <select id="modeSelect" class="mode-select" aria-label="App mode">
        <option value="trace" selected>Trace mode</option>
        <option value="convex">Convex mirror selfie</option>
      </select>

      <div id="traceControls" class="control-row">
        <input id="opacitySlider" class="slider" type="range" min="0" max="1" step="0.01" value="0.4" aria-label="Overlay opacity" />
        <button id="uploadButton" class="upload" type="button">Upload</button>
      </div>

      <div id="mirrorControls" class="control-row hidden">
        <button id="captureButton" class="upload" type="button">Capture</button>
        <a id="saveLink" class="save-link hidden" href="#" download="convex-selfie.jpg">Save</a>
      </div>

      <input id="fileInput" type="file" accept="image/*" />
    </div>
  </div>

  <script>
    const camera = document.getElementById('camera');
    const mirrorCanvas = document.getElementById('mirrorCanvas');
    const overlayShell = document.getElementById('overlayShell');
    const overlayImage = document.getElementById('overlayImage');
    const modeSelect = document.getElementById('modeSelect');
    const traceControls = document.getElementById('traceControls');
    const mirrorControls = document.getElementById('mirrorControls');
    const opacitySlider = document.getElementById('opacitySlider');
    const uploadButton = document.getElementById('uploadButton');
    const captureButton = document.getElementById('captureButton');
    const saveLink = document.getElementById('saveLink');
    const fileInput = document.getElementById('fileInput');

    let cameraStream = null;
    let imageLoaded = false;
    let renderPending = false;
    let rafId = 0;
    let mirrorRafId = 0;
    let currentMode = 'trace';
    let mirrorMap = null;
    let mirrorOutput = null;
    const processCanvas = document.createElement('canvas');
    const processCtx = processCanvas.getContext('2d', { willReadFrequently: true });
    const mirrorCtx = mirrorCanvas.getContext('2d', { alpha: false, willReadFrequently: true });

    const transform = {
      x: 0,
      y: 0,
      scale: 1,
      rotation: 0,
    };

    const gesture = {
      mode: null,
      startX: 0,
      startY: 0,
      startDistance: 0,
      startAngle: 0,
      startScale: 1,
      startRotation: 0,
      startCenterX: 0,
      startCenterY: 0,
      baseX: 0,
      baseY: 0,
    };

    function scheduleRender() {
      if (renderPending) {
        return;
      }

      renderPending = true;
      rafId = requestAnimationFrame(() => {
        renderPending = false;
        overlayShell.style.transform = `translate(-50%, -50%) translate3d(${transform.x}px, ${transform.y}px, 0) rotate(${transform.rotation}deg) scale(${transform.scale})`;
      });
    }

    function centerOverlay() {
      transform.x = 0;
      transform.y = 0;
      transform.scale = 1;
      transform.rotation = 0;
      scheduleRender();
    }

    function updateOpacity(value) {
      const clamped = Math.min(1, Math.max(0, Number(value)));
      opacitySlider.value = String(clamped);
      overlayShell.style.setProperty('--overlay-opacity', String(clamped));
    }

    function updateModeUi() {
      const inTraceMode = currentMode === 'trace';
      camera.classList.toggle('hidden', !inTraceMode);
      mirrorCanvas.classList.toggle('hidden', inTraceMode);
      overlayShell.classList.toggle('hidden', !inTraceMode);
      traceControls.classList.toggle('hidden', !inTraceMode);
      mirrorControls.classList.toggle('hidden', inTraceMode);

      if (inTraceMode) {
        saveLink.classList.add('hidden');
      }
    }

    function stopCamera() {
      if (cameraStream) {
        cameraStream.getTracks().forEach((track) => track.stop());
        cameraStream = null;
      }

      camera.srcObject = null;
    }

    function resizeMirrorProcessing() {
      const dpr = Math.min(2, window.devicePixelRatio || 1);
      const cssWidth = Math.max(1, window.innerWidth);
      const cssHeight = Math.max(1, window.innerHeight);
      const width = Math.max(240, Math.min(720, Math.round(cssWidth * dpr * 0.55)));
      const height = Math.max(240, Math.min(1280, Math.round(cssHeight * dpr * 0.55)));

      if (processCanvas.width !== width || processCanvas.height !== height) {
        processCanvas.width = width;
        processCanvas.height = height;
        mirrorCanvas.width = width;
        mirrorCanvas.height = height;
        mirrorMap = null;
        mirrorOutput = null;
      }
    }

    function buildMirrorMap(width, height) {
      const map = new Uint32Array(width * height);
      const cx = (width - 1) * 0.5;
      const cy = (height - 1) * 0.5;
      const invCx = 1 / Math.max(cx, 1);
      const invCy = 1 / Math.max(cy, 1);

      for (let y = 0; y < height; y += 1) {
        const ny = (y - cy) * invCy;

        for (let x = 0; x < width; x += 1) {
          const nx = (x - cx) * invCx;
          const radius = Math.min(1, Math.hypot(nx, ny));
          const sourceRadius = Math.pow(radius, 1.55);
          const theta = Math.atan2(ny, nx);

          const warpedNx = Math.cos(theta) * sourceRadius;
          const warpedNy = Math.sin(theta) * sourceRadius;
          const sx = Math.max(0, Math.min(width - 1, Math.round((warpedNx * 0.5 + 0.5) * (width - 1))));
          const sy = Math.max(0, Math.min(height - 1, Math.round((warpedNy * 0.5 + 0.5) * (height - 1))));
          map[y * width + x] = (sy * width) + sx;
        }
      }

      return map;
    }

    function renderConvexFrame() {
      if (currentMode !== 'convex') {
        mirrorRafId = 0;
        return;
      }

      if (camera.readyState >= HTMLMediaElement.HAVE_CURRENT_DATA && processCtx && mirrorCtx) {
        resizeMirrorProcessing();

        const width = processCanvas.width;
        const height = processCanvas.height;

        if (!mirrorMap || mirrorMap.length !== width * height) {
          mirrorMap = buildMirrorMap(width, height);
          mirrorOutput = mirrorCtx.createImageData(width, height);
        }

        // Mirror the input to behave like a selfie camera.
        processCtx.save();
        processCtx.scale(-1, 1);
        processCtx.drawImage(camera, -width, 0, width, height);
        processCtx.restore();

        const source = processCtx.getImageData(0, 0, width, height).data;
        const output = mirrorOutput.data;

        for (let i = 0; i < mirrorMap.length; i += 1) {
          const si = mirrorMap[i] * 4;
          const di = i * 4;
          output[di] = source[si];
          output[di + 1] = source[si + 1];
          output[di + 2] = source[si + 2];
          output[di + 3] = 255;
        }

        mirrorCtx.putImageData(mirrorOutput, 0, 0);
      }

      mirrorRafId = requestAnimationFrame(renderConvexFrame);
    }

    function startConvexLoop() {
      if (mirrorRafId) {
        cancelAnimationFrame(mirrorRafId);
      }

      mirrorRafId = requestAnimationFrame(renderConvexFrame);
    }

    async function switchMode(mode) {
      if (mode !== 'trace' && mode !== 'convex') {
        return;
      }

      currentMode = mode;
      updateModeUi();
      saveLink.classList.add('hidden');

      try {
        await startCamera();
      } catch (error) {
        console.error('Switch mode error:', error);
      }

      if (currentMode === 'convex') {
        startConvexLoop();
      } else if (mirrorRafId) {
        cancelAnimationFrame(mirrorRafId);
        mirrorRafId = 0;
      }
    }

    function loadImageFromFile(file) {
      if (!file || !file.type.startsWith('image/')) {
        return;
      }

      const objectUrl = URL.createObjectURL(file);
      overlayImage.onload = () => {
        imageLoaded = true;
        overlayImage.style.display = 'block';
        centerOverlay();
        URL.revokeObjectURL(objectUrl);
      };

      overlayImage.onerror = () => {
        URL.revokeObjectURL(objectUrl);
      };

      overlayImage.src = objectUrl;
    }

    function getDistance(touchA, touchB) {
      const dx = touchB.clientX - touchA.clientX;
      const dy = touchB.clientY - touchA.clientY;
      return Math.hypot(dx, dy);
    }

    function getAngle(touchA, touchB) {
      return Math.atan2(touchB.clientY - touchA.clientY, touchB.clientX - touchA.clientX) * (180 / Math.PI);
    }

    function getCenter(touchA, touchB) {
      return {
        x: (touchA.clientX + touchB.clientX) / 2,
        y: (touchA.clientY + touchB.clientY) / 2,
      };
    }

    overlayShell.addEventListener('touchstart', (event) => {
      if (!imageLoaded) {
        return;
      }

      event.preventDefault();
      overlayShell.classList.add('dragging');

      if (event.touches.length === 1) {
        const touch = event.touches[0];
        gesture.mode = 'drag';
        gesture.startX = touch.clientX;
        gesture.startY = touch.clientY;
        gesture.baseX = transform.x;
        gesture.baseY = transform.y;
      } else if (event.touches.length >= 2) {
        const touchA = event.touches[0];
        const touchB = event.touches[1];
        const center = getCenter(touchA, touchB);

        gesture.mode = 'gesture';
        gesture.startDistance = getDistance(touchA, touchB);
        gesture.startAngle = getAngle(touchA, touchB);
        gesture.startScale = transform.scale;
        gesture.startRotation = transform.rotation;
        gesture.startCenterX = center.x;
        gesture.startCenterY = center.y;
        gesture.baseX = transform.x;
        gesture.baseY = transform.y;
      }
    }, { passive: false });

    overlayShell.addEventListener('touchmove', (event) => {
      if (!imageLoaded || !gesture.mode) {
        return;
      }

      event.preventDefault();

      if (gesture.mode === 'drag' && event.touches.length === 1) {
        const touch = event.touches[0];
        transform.x = gesture.baseX + (touch.clientX - gesture.startX);
        transform.y = gesture.baseY + (touch.clientY - gesture.startY);
        scheduleRender();
        return;
      }

      if (event.touches.length >= 2) {
        const touchA = event.touches[0];
        const touchB = event.touches[1];
        const center = getCenter(touchA, touchB);
        const distance = getDistance(touchA, touchB);
        const angle = getAngle(touchA, touchB);

        const scaleFactor = distance / Math.max(gesture.startDistance, 0.001);
        transform.scale = Math.max(0.2, Math.min(4, gesture.startScale * scaleFactor));
        transform.rotation = gesture.startRotation + (angle - gesture.startAngle);
        transform.x = gesture.baseX + (center.x - gesture.startCenterX);
        transform.y = gesture.baseY + (center.y - gesture.startCenterY);
        scheduleRender();
      }
    }, { passive: false });

    overlayShell.addEventListener('touchend', (event) => {
      if (!event.touches.length) {
        gesture.mode = null;
        overlayShell.classList.remove('dragging');
      } else if (event.touches.length === 1) {
        const touch = event.touches[0];
        gesture.mode = 'drag';
        gesture.startX = touch.clientX;
        gesture.startY = touch.clientY;
        gesture.baseX = transform.x;
        gesture.baseY = transform.y;
      }
    }, { passive: false });

    overlayShell.addEventListener('touchcancel', () => {
      gesture.mode = null;
      overlayShell.classList.remove('dragging');
    }, { passive: false });

    overlayShell.addEventListener('mousedown', (event) => {
      if (event.button !== 0 || !imageLoaded) {
        return;
      }

      event.preventDefault();
      gesture.mode = 'mouse-drag';
      gesture.startX = event.clientX;
      gesture.startY = event.clientY;
      gesture.baseX = transform.x;
      gesture.baseY = transform.y;
      overlayShell.classList.add('dragging');
    });

    window.addEventListener('mousemove', (event) => {
      if (gesture.mode !== 'mouse-drag') {
        return;
      }

      event.preventDefault();
      transform.x = gesture.baseX + (event.clientX - gesture.startX);
      transform.y = gesture.baseY + (event.clientY - gesture.startY);
      scheduleRender();
    });

    window.addEventListener('mouseup', () => {
      if (gesture.mode === 'mouse-drag') {
        gesture.mode = null;
        overlayShell.classList.remove('dragging');
      }
    });

    overlayShell.addEventListener('wheel', (event) => {
      if (!imageLoaded) {
        return;
      }

      event.preventDefault();
      const factor = Math.sign(event.deltaY) > 0 ? 0.94 : 1.06;
      transform.scale = Math.max(0.2, Math.min(4, transform.scale * factor));
      scheduleRender();
    }, { passive: false });

    uploadButton.addEventListener('click', () => {
      fileInput.click();
    });

    fileInput.addEventListener('change', () => {
      loadImageFromFile(fileInput.files && fileInput.files[0]);
      fileInput.value = '';
    });

    opacitySlider.addEventListener('input', (event) => {
      updateOpacity(event.target.value);
    });

    modeSelect.addEventListener('change', (event) => {
      switchMode(event.target.value);
    });

    captureButton.addEventListener('click', () => {
      if (currentMode !== 'convex') {
        return;
      }

      if (!mirrorCanvas.width || !mirrorCanvas.height) {
        return;
      }

      const stamp = new Date();
      const filename = `convex-selfie-${stamp.getFullYear()}${String(stamp.getMonth() + 1).padStart(2, '0')}${String(stamp.getDate()).padStart(2, '0')}-${String(stamp.getHours()).padStart(2, '0')}${String(stamp.getMinutes()).padStart(2, '0')}${String(stamp.getSeconds()).padStart(2, '0')}.jpg`;
      const imageDataUrl = mirrorCanvas.toDataURL('image/jpeg', 0.92);

      saveLink.href = imageDataUrl;
      saveLink.download = filename;
      saveLink.classList.remove('hidden');
    });

    window.addEventListener('resize', () => {
      if (currentMode === 'convex') {
        resizeMirrorProcessing();
      }
    });

    async function startCamera() {
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        return;
      }

      stopCamera();

      try {
        const facing = currentMode === 'convex' ? 'user' : 'environment';

        cameraStream = await navigator.mediaDevices.getUserMedia({
          audio: false,
          video: {
            facingMode: { ideal: facing },
            width: { ideal: 1920 },
            height: { ideal: 1080 },
          },
        });

        camera.srcObject = cameraStream;
        await camera.play();
      } catch (error) {
        console.error('Camera error:', error);
      }
    }

    document.addEventListener('gesturestart', (event) => event.preventDefault());
    document.addEventListener('touchmove', (event) => {
      if (event.target.closest('.overlay-shell')) {
        event.preventDefault();
      }
    }, { passive: false });

    window.addEventListener('beforeunload', () => {
      stopCamera();

      if (rafId) {
        cancelAnimationFrame(rafId);
      }

      if (mirrorRafId) {
        cancelAnimationFrame(mirrorRafId);
      }
    });

    updateOpacity(opacitySlider.value);
    centerOverlay();
    updateModeUi();
    startCamera();
  </script>
</body>
</html>
